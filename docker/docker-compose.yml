version: '3.8'

services:
  visionstream:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: visionstream:latest
    container_name: visionstream_dev
    # Support for NVIDIA GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      # Mount the entire VisionStream source folder to /app to avoid rebuilding image for code changes
      - ../:/app
      # Optional: mount external datasets (uncomment and modify paths as needed)
      #- /path/to/local/datasets:/datasets
      # Keep container running, useful for dev
    tty: true
    stdin_open: true
    working_dir: /app
    # command: >
    #   bash -c "mkdir -p build && cd build && cmake .. && make -j$$(nproc) && cd .. && python tests/test_pipeline.py && tail -f /dev/null"
